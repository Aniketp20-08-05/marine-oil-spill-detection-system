name: Backend CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
  pull_request:
    branches:
      - main
      - develop

jobs:
  backend-check:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Initialize database
        run: python -m app.db.init_db

      - name: Verify backend imports
        run: python -c "from app.main import app; print(app.title)"

      - name: Verify database tables
        run: python -c "from app.db.session import engine; from sqlalchemy import inspect; print(inspect(engine).get_table_names())"